services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env.dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finly_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
  app:
    build: .
    env_file:
      - .env.dev
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload"

volumes:
  postgres_data_dev: